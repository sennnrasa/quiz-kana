<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Quiz JLPT N5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
        body { font-family: 'Quicksand', sans-serif; background: #f0f2f5; }
        .answer-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .answer-card:active { transform: scale(0.98); }
        .shake { animation: shake 0.5s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .correct-pulse { animation: pulse 0.5s; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-xl w-full bg-white rounded-[2rem] shadow-2xl overflow-hidden relative">
        <!-- Progress Bar -->
        <div class="h-1.5 bg-gray-100">
            <div id="progress" class="h-full bg-blue-500 transition-all duration-300" style="width: 0%"></div>
        </div>

        <div class="p-8">
            <!-- Header Stats -->
            <div class="flex justify-between items-center mb-8">
                <div class="bg-blue-50 text-blue-600 px-4 py-1 rounded-full text-sm font-bold" id="q-count">
                    Soal 1 / 20
                </div>
                <div class="flex items-center gap-2 font-bold text-gray-700">
                    <span id="score-display">Poin: 0</span>
                </div>
            </div>

            <!-- Quiz Content -->
            <div id="quiz-content">
                <div id="situation-box" class="mb-4 text-sm bg-orange-50 text-orange-700 p-3 rounded-xl border border-orange-100 italic">
                    Situasi: Memegang benda di tangan sendiri.
                </div>
                <h2 id="question-text" class="text-2xl font-bold text-gray-800 mb-8 min-h-[4rem]">
                    「_____ は わたしの 本です。」
                </h2>

                <div id="options-grid" class="grid gap-3">
                    <!-- Buttons injected here -->
                </div>
            </div>

            <!-- Result Screen (Hidden by default) -->
            <div id="result-screen" class="hidden text-center py-10">
                <div id="result-icon" class="text-6xl mb-4">🏆</div>
                <h2 class="text-3xl font-bold text-gray-800 mb-2" id="result-title">Luar Biasa!</h2>
                <p class="text-gray-500 mb-6" id="result-desc">Kamu memiliki pemahaman dasar yang kuat.</p>
                <div class="bg-gray-50 rounded-3xl p-6 mb-8">
                    <span class="block text-gray-400 text-sm uppercase font-bold tracking-widest">Skor Akhir</span>
                    <span class="text-6xl font-black text-blue-600" id="final-score">0</span>
                    <span class="text-gray-400 font-bold block mt-1">/ 200</span>
                </div>
                <button onclick="location.reload()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 transition-all">
                    Ulangi Kuis
                </button>
            </div>
        </div>
    </div>

    <script>
        const quizData = [
            // KOSOADO
            { s: "Situasi: Memegang kamus di tangan sendiri.", q: "「_____ は わたしの じしょです。」", o: ["これ", "それ", "あれ", "この"], a: 0 },
            { s: "Situasi: Menunjuk mobil yang parkir jauh di sana.", q: "「_____ くるまは だれのですか。」", o: ["その", "あの", "これ", "あれ"], a: 1 },
            { s: "Situasi: Bertanya tentang benda yang dipegang teman.", q: "「_____ は なんですか。」", o: ["これ", "それ", "あれ", "この"], a: 1 },
            { s: "Situasi: Menunjuk bangunan jauh di seberang sungai.", q: "「_____ は びょういんです。」", o: ["それ", "これ", "あれ", "あの"], a: 2 },
            { s: "Situasi: Menunjuk buku yang ada di atas meja teman.", q: "「_____ ほんは わたしのです。」", o: ["この", "その", "あの", "どの"], a: 1 },
            
            // PARTIKEL
            { s: "Partikel: Menunjukkan subjek.", q: "わたし _____ サトリアです。", o: ["は", "に", "を", "が"], a: 0 },
            { s: "Partikel: Menunjukkan waktu.", q: "まいあさ 6じ _____ おきます。", o: ["を", "に", "で", "も"], a: 1 },
            { s: "Partikel: Menunjukkan tempat aktivitas.", q: "がっこう _____ べんきょうします。", o: ["に", "で", "を", "へ"], a: 1 },
            { s: "Partikel: Menunjukkan kepemilikan.", q: "それは せんせい _____ かばんです。", o: ["は", "の", "を", "に"], a: 1 },
            { s: "Partikel: Menunjukkan objek aksi.", q: "パン _____ たべました。", o: ["は", "に", "を", "が"], a: 2 },

            // KOSAKATA & LAWAN KATA
            { s: "Kosakata: Apa bahasa Jepang dari 'Sekolah'?", q: "学校 adalah...", o: ["Ginkou", "Gakkou", "Kissa-ten", "Byouin"], a: 1 },
            { s: "Lawan Kata: Lawan kata dari 'たかい' (Mahal) adalah...", o: ["あつい", "やすい", "ちかい", "ひくい"], a: 1 },
            { s: "Kosakata: Apa arti dari 'あさごはん'?", q: "「あさごはん を たべます。」", o: ["Makan siang", "Makan malam", "Sarapan", "Camilan"], a: 2 },
            { s: "Waktu: Jam 4:30 dalam bahasa Jepang adalah...", o: ["Yoji-han", "Shiji-han", "Yoji-juupun", "Shiji-juupun"], a: 0 },
            { s: "Hari: 'Getsuyoubi' adalah hari...", o: ["Selasa", "Minggu", "Senin", "Rabu"], a: 2 },

            // KATA KERJA
            { s: "Kata Kerja: Bentuk -masu dari 'Yomu' (Membaca).", q: "わたしは ほんを _____。", o: ["よみます", "よんで", "よむます", "よみました"], a: 0 },
            { s: "Kata Kerja: Bentuk -te dari 'Nomu' (Minum).", q: "「おみずを _____ ください。」", o: ["のみて", "のんで", "のって", "のみで"], a: 1 },
            { s: "Kata Kerja: Bentuk -masu dari 'Suru' (Melakukan).", q: "べんきょうを _____。", o: ["しります", "します", "しりて", "しますした"], a: 1 },
            { s: "Kata Kerja: Bentuk -te dari 'Matsu' (Menunggu).", q: "「ちょっと _____ ください。」", o: ["まて", "まちて", "まって", "まちた"], a: 2 },
            { s: "Kata Kerja: Bentuk -masu dari 'Kuru' (Datang).", q: "ともだちが _____。", o: ["きます", "きります", "こます", "くるます"], a: 0 }
        ];

        let currentIdx = 0;
        let score = 0;

        function loadQuestion() {
            if (currentIdx >= quizData.length) return showResult();
            
            const data = quizData[currentIdx];
            document.getElementById('q-count').innerText = `Soal ${currentIdx + 1} / ${quizData.length}`;
            document.getElementById('situation-box').innerText = data.s;
            document.getElementById('question-text').innerText = data.q;
            document.getElementById('progress').style.width = `${(currentIdx / quizData.length) * 100}%`;
            
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            data.o.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = "answer-card text-left p-5 rounded-2xl border-2 border-gray-100 hover:border-blue-500 hover:bg-blue-50 font-semibold text-gray-700 bg-white shadow-sm";
                btn.innerText = `${i + 1}. ${opt}`;
                btn.onclick = () => checkAnswer(i, btn);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(idx, btn) {
            const correct = quizData[currentIdx].a;
            const container = document.getElementById('app');
            
            if (idx === correct) {
                score += 10;
                btn.classList.replace('border-gray-100', 'border-green-500');
                btn.classList.add('bg-green-50', 'text-green-700', 'correct-pulse');
                document.getElementById('score-display').innerText = `Poin: ${score}`;
            } else {
                btn.classList.replace('border-gray-100', 'border-red-500');
                btn.classList.add('bg-red-50', 'text-red-700', 'shake');
                container.classList.add('shake');
                setTimeout(() => container.classList.remove('shake'), 500);
            }

            setTimeout(() => {
                currentIdx++;
                loadQuestion();
            }, 800);
        }

        function showResult() {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('q-count').classList.add('hidden');
            document.getElementById('progress').style.width = '100%';
            
            const resultScreen = document.getElementById('result-screen');
            const finalScore = document.getElementById('final-score');
            const resTitle = document.getElementById('result-title');
            const resDesc = document.getElementById('result-desc');
            const resIcon = document.getElementById('result-icon');
            
            resultScreen.classList.remove('hidden');
            finalScore.innerText = score;

            if (score >= 180) {
                resTitle.innerText = "Luar Biasa! (満点に近い)";
                resDesc.innerText = "Kamu sudah sangat siap untuk lombs kana .";
                resIcon.innerText = "👑";
            } else if (score >= 120) {
                resTitle.innerText = "Bagus Sekali! (合格)";
                resDesc.innerText = "Kamu sudah lulus standar nilai.";
                resIcon.innerText = "⭐";
            } else {
                resTitle.innerText = "Terus Berjuang! (頑張って)";
                resDesc.innerText = "Perbanyak latihan lagi di bagian partikel dan kata kerja.";
                resIcon.innerText = "📚";
            }
        }

        window.onload = loadQuestion;
    </script>
</body>
</html>
