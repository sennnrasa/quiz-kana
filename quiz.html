<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JLPT N5 Mastery Quiz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --primary: #4f46e5; --success: #22c55e; --error: #ef4444; --bg: #f8fafc; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .quiz-card { background: white; width: 100%; max-width: 500px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .progress-bar { height: 6px; background: #e2e8f0; width: 100%; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }
        .content { padding: 30px; }
        .badge { background: #eef2ff; color: var(--primary); padding: 5px 12px; border-radius: 99px; font-size: 0.8rem; font-weight: 700; }
        .situation { background: #fff7ed; color: #9a3412; padding: 12px; border-radius: 12px; font-size: 0.85rem; margin: 15px 0; border-left: 4px solid #fb923c; }
        .question { font-size: 1.3rem; font-weight: 800; margin-bottom: 20px; color: #1e293b; }
        .options { display: grid; gap: 10px; }
        .btn { background: #fff; border: 2px solid #f1f5f9; padding: 15px; border-radius: 15px; text-align: left; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn:hover { border-color: var(--primary); background: #f5f3ff; }
        .btn.correct { border-color: var(--success); background: #f0fdf4; color: #166534; }
        .btn.wrong { border-color: var(--error); background: #fef2f2; color: #991b1b; }
        .result-view { display: none; text-align: center; }
        .final-score { font-size: 4rem; font-weight: 900; color: var(--primary); }
        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="quiz-card" id="card">
    <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
    <div class="content">
        <div id="game-view">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <span class="badge" id="counter">1 / 20</span>
                <span id="score" style="font-weight:700; color:#64748b">Poin: 0</span>
            </div>
            <div class="situation" id="sit">Situasi...</div>
            <h2 class="question" id="ques">Question?</h2>
            <div class="options" id="opts"></div>
        </div>

        <div id="result-view" class="result-view">
            <div style="font-size:3rem">🏆</div>
            <h2 id="res-title">Selesai!</h2>
            <div class="final-score" id="f-score">0</div>
            <p style="margin-bottom:20px; color:#64748b">DARI 200 POIN</p>
            <button class="btn" style="width:100%; text-align:center; background:var(--primary); color:white" onclick="location.reload()">Main Lagi</button>
        </div>
    </div>
</div>

<script>
    const data = [
        {s:"Memegang kamus sendiri.", q:"「___ は わたしの じしょです。」", o:["これ","それ","あれ","この"], a:0},
        {s:"Mobil parkir jauh di sana.", q:"「___ くるまは だれのですか。」", o:["その","あの","これ","あれ"], a:1},
        {s:"Benda yang dipegang teman.", q:"「___ は なんですか。」", o:["これ","それ","あれ","この"], a:1},
        {s:"Gedung jauh di seberang jalan.", q:"「___ は びょういんです。」", o:["それ","これ","あれ","あの"], a:2},
        {s:"Buku di atas meja teman.", q:"「___ ほんは わたしのです。」", o:["この","その","あの","どの"], a:1},
        {s:"Partikel Subjek.", q:"わたし ___ サトリアです。", o:["は","に","が","を"], a:0},
        {s:"Partikel Waktu.", q:"まいあさ 6じ ___ おきます。", o:["を","に","で","も"], a:1},
        {s:"Tempat Aktivitas.", q:"がっこう ___ べんきょうします。", o:["に","で","を","へ"], a:1},
        {s:"Partikel Kepemilikan.", q:"それは せんせい ___ かばんです。", o:["は","の","を","に"], a:1},
        {s:"Objek Langsung.", q:"パン ___ たべました。", o:["は","に","を","が"], a:2},
        {s:"Bahasa Jepang 'Sekolah'.", q:"学校 adalah...", o:["Ginkou","Gakkou","Kissaten","Byouin"], a:1},
        {s:"Lawan kata Mahal (Takai).", q:"Lawan kata たかい adalah...", o:["あつい","安い (やすい)","ちかい","ひくい"], a:1},
        {s:"Apa itu 'Asagohan'?", q:"「あさごはん を たべます。」", o:["Makan siang","Makan malam","Sarapan","Camilan"], a:2},
        {s:"Jam 4:30.", q:"Jam 4:30 adalah...", o:["Yoji-han","Shiji-han","Yoji-juupun","Shiji-juupun"], a:0},
        {s:"Getsuyoubi.", q:"'Getsuyoubi' adalah hari...", o:["Selasa","Minggu","Senin","Rabu"], a:2},
        {s:"Bentuk -masu: Yomu.", q:"わたしは ほんを ___。", o:["よみます","よんで","よむます","よみました"], a:0},
        {s:"Bentuk -te: Nomu.", q:"「おみずを ___ ください。」", o:["のみて","のんで","のって","のみで"], a:1},
        {s:"Bentuk -masu: Suru.", q:"べんきょうを ___。", o:["しります","します","しりて","しますした"], a:1},
        {s:"Bentuk -te: Matsu.", q:"「ちょっと ___ ください。」", o:["まて","まちて","まって","まちた"], a:2},
        {s:"Bentuk -masu: Kuru.", q:"ともだちが ___。", o:["きます","きります","こます","くるます"], a:0}
    ];

    let idx = 0, score = 0, lock = false;

    function render() {
        if(idx >= data.length) return showRes();
        const d = data[idx];
        document.getElementById('counter').innerText = `${idx+1} / ${data.length}`;
        document.getElementById('sit').innerText = `Situasi: ${d.s}`;
        document.getElementById('ques').innerText = d.q;
        document.getElementById('fill').style.width = `${(idx/data.length)*100}%`;
        const o = document.getElementById('opts');
        o.innerHTML = '';
        d.o.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'btn';
            b.innerText = txt;
            b.onclick = () => {
                if(lock) return;
                lock = true;
                if(i === d.a) { b.classList.add('correct'); score+=10; }
                else { b.classList.add('wrong'); document.getElementById('card').classList.add('shake'); }
                document.getElementById('score').innerText = `Poin: ${score}`;
                setTimeout(() => { document.getElementById('card').classList.remove('shake'); idx++; lock=false; render(); }, 800);
            };
            o.appendChild(b);
        });
    }

    function showRes() {
        document.getElementById('game-view').classList.add('hidden');
        document.getElementById('result-view').style.display = 'block';
        document.getElementById('f-score').innerText = score;
        document.getElementById('fill').style.width = '100%';
    }

    render();
</script>
</body>
</html>
